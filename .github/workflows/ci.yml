name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly govulncheck rerun against the current main so a CVE landing
  # mid-week against an unchanged dependency tree still gets caught.
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: gofmt -l . | tee /tmp/fmt.out && test ! -s /tmp/fmt.out
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -timeout 15m -coverprofile=coverage.out ./...
      - name: tiered coverage gate
        shell: bash
        run: |
          # Statement-coverage floors per package. The Integration API is
          # plain HTTP+JSON, so every layer is unit-coverable against the
          # httptest fake in internal/testutil - no live controller needed.
          # Tier 1 = helpers, Tier 2 = CRUD layers. Both hold at 100.
          declare -A TIER1=(
            [github.com/PjSalty/terraform-provider-unifi/internal/providerdata]=100
            [github.com/PjSalty/terraform-provider-unifi/internal/testutil]=100
          )
          declare -A TIER2_FLOOR=(
            [github.com/PjSalty/terraform-provider-unifi/internal/resources]=100
            [github.com/PjSalty/terraform-provider-unifi/internal/datasources]=100
            [github.com/PjSalty/terraform-provider-unifi/internal/provider]=100
          )

          declare -A PKG_COV
          while IFS= read -r row; do
            pkg=$(awk -F: '{print $1}' <<<"$row" | xargs dirname)
            stmts=$(awk '{print $2}' <<<"$row")
            covered=$(awk '{print $3}' <<<"$row")
            if [ -z "${PKG_COV[$pkg]:-}" ]; then PKG_COV[$pkg]="0 0"; fi
            s=$(awk '{print $1}' <<<"${PKG_COV[$pkg]}")
            c=$(awk '{print $2}' <<<"${PKG_COV[$pkg]}")
            s=$((s + stmts))
            if [ "$covered" -gt 0 ]; then c=$((c + stmts)); fi
            PKG_COV[$pkg]="$s $c"
          done < <(tail -n +2 coverage.out)

          fail=0
          for pkg in "${!PKG_COV[@]}"; do
            s=$(awk '{print $1}' <<<"${PKG_COV[$pkg]}")
            c=$(awk '{print $2}' <<<"${PKG_COV[$pkg]}")
            if [ "$s" -eq 0 ]; then continue; fi
            cov_int=$((c * 100 / s))
            if [ -n "${TIER1[$pkg]:-}" ]; then
              floor=${TIER1[$pkg]}
              if [ "$cov_int" -lt "$floor" ]; then
                echo "  TIER1 $pkg: ${cov_int}% < ${floor}% floor"
                fail=$((fail + 1))
              fi
            elif [ -n "${TIER2_FLOOR[$pkg]:-}" ]; then
              floor=${TIER2_FLOOR[$pkg]}
              if [ "$cov_int" -lt "$floor" ]; then
                echo "  TIER2 $pkg: ${cov_int}% < ${floor}% floor"
                fail=$((fail + 1))
              fi
            fi
          done

          TOTAL=$(go tool cover -func=coverage.out | awk 'END {gsub("%",""); print $NF}')
          echo "total coverage: ${TOTAL}%"

          if [ "$fail" -gt 0 ]; then
            echo "${fail} package(s) below their coverage floor, blocking merge"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build -v ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@latest && tfplugindocs validate
